<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scientist</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #ffffff;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      overflow-x: hidden;
    }

    /* Decorative background blobs */
    body::before {
      content: '';
      position: fixed;
      top: -120px;
      right: -120px;
      width: 480px;
      height: 480px;
      border-radius: 50%;
      background: radial-gradient(circle, #e6f1fb 0%, #eaf3de 60%, transparent 100%);
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -100px;
      left: -100px;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, #eaf3de 0%, #e6f1fb 60%, transparent 100%);
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: #ffffff;
      border: 1.5px solid #b5d4f4;
      border-radius: 20px;
      padding: 3rem 3.5rem;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 4px 40px rgba(55, 138, 221, 0.08), 0 1px 6px rgba(99, 153, 34, 0.06);
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Top accent bar */
    .accent-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 2rem;
    }
    .accent-bar span {
      height: 4px;
      border-radius: 99px;
    }
    .accent-bar .bar-blue  { background: #378add; width: 48px; }
    .accent-bar .bar-green { background: #639922; width: 24px; }
    .accent-bar .bar-light { background: #b5d4f4; width: 12px; }

    /* Title */
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.6rem;
      font-weight: 700;
      color: #185fa5;
      letter-spacing: -0.5px;
      line-height: 1.1;
      margin-bottom: 0.3rem;
    }

    /* Heading */
    h2 {
      font-size: 0.95rem;
      font-weight: 500;
      color: #3b6d11;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 2.2rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h2::before {
      content: '';
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #639922;
    }

    /* Label */
    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      color: #185fa5;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 0.6rem;
    }

    /* Input */
    .input-wrap {
      position: relative;
      margin-bottom: 1.5rem;
    }
    input[type="text"] {
      width: 100%;
      padding: 0.85rem 3.2rem 0.85rem 1.1rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 400;
      color: #0c447c;
      background: #f4f9fe;
      border: 1.5px solid #b5d4f4;
      border-radius: 10px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      letter-spacing: 0.5px;
    }
    input[type="text"]::placeholder { color: #85b7eb; }
    input[type="text"]:focus {
      border-color: #378add;
      box-shadow: 0 0 0 3px rgba(55,138,221,0.12);
    }

    /* Atom icon inside input */
    .input-wrap svg.icon {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      stroke: #85b7eb;
      pointer-events: none;
    }

    /* Button */
    button {
      width: 100%;
      padding: 0.9rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.5px;
      color: #ffffff;
      background: linear-gradient(135deg, #185fa5 0%, #378add 100%);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    button:hover { opacity: 0.92; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(24,95,165,0.22); }
    button:active { transform: scale(0.98); }

    /* Error message */
    .error-msg {
      display: none;
      margin-top: 1rem;
      background: #f4fce8;
      border: 1px solid #c0dd97;
      color: #3b6d11;
      border-radius: 8px;
      padding: 0.7rem 1rem;
      font-size: 0.88rem;
      font-weight: 400;
      text-align: center;
      animation: fadeUp 0.3s ease both;
    }
    .error-msg.show { display: block; }
    .error-msg.invalid {
      background: #fef6f6;
      border-color: #f09595;
      color: #a32d2d;
    }

    /* Footer tag */
    .footer-tag {
      margin-top: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 0.75rem;
      font-weight: 300;
      color: #85b7eb;
      letter-spacing: 0.5px;
    }
    .footer-tag span { width: 16px; height: 1px; background: #b5d4f4; display: inline-block; }
  </style>
</head>
<body>

<div class="card">

  <div class="accent-bar">
    <span class="bar-blue"></span>
    <span class="bar-green"></span>
    <span class="bar-light"></span>
  </div>

  <h1>Scientist</h1>
  <h2>2026 Lab Results</h2>

  <label for="ussInput">Enter your USS here</label>
  <div class="input-wrap">
    <input
      type="text"
      id="ussInput"
      placeholder="e.g. USS-00142"
      maxlength="30"
      autocomplete="off"
      spellcheck="false"
    />
    <!-- Microscope icon -->
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="10" cy="10" r="3"/><path d="M10 13v5"/><path d="M7 21h6"/><path d="M10 7V4"/><path d="M13 4h2l2 3-2 3h-2"/>
    </svg>
  </div>

  <button onclick="handleLookup()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    Open Lab Results
  </button>

  <div class="error-msg" id="statusMsg"></div>

  <div class="footer-tag"><span></span> Confidential · Lab Access Only <span></span></div>
</div>

<script>
  /*
  ══════════════════════════════════════════════════════
   HOW TO ADD YOUR IDs AND PDF LINKS
   ─────────────────────────────────────────────────────
   Each entry below maps one USS ID → one PDF link.
   Format:  "YOUR_ID": "YOUR_PDF_LINK",

   Example:
     "USS-00142": "https://drive.google.com/file/d/ABC123/view",
     "USS-00199": "https://drive.google.com/file/d/XYZ456/view",

   To add more, just copy a line and change the ID and link.
  ══════════════════════════════════════════════════════
  */
  const pdfMap = {
    "USS-00142": "https://drive.google.com/file/d/REPLACE_WITH_YOUR_FILE_ID/view"
  };

  function handleLookup() {
    const raw = document.getElementById("ussInput").value.trim();
    const msg = document.getElementById("statusMsg");

    if (!raw) {
      showMsg("Please enter your USS ID.", false);
      return;
    }

    const url = pdfMap[raw] || pdfMap[raw.toUpperCase()];

    if (url) {
      showMsg("Opening your results…", true);
      setTimeout(() => { window.open(url, "_blank"); }, 400);
    } else {
      showMsg("ID not recognised. Please check and try again.", false);
    }
  }

  function showMsg(text, success) {
    const msg = document.getElementById("statusMsg");
    msg.textContent = text;
    msg.className = "error-msg show" + (success ? "" : " invalid");
  }

  document.getElementById("ussInput").addEventListener("keydown", function(e) {
    if (e.key === "Enter") handleLookup();
  });
</script>
</body>
</html>
